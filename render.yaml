services:
  - type: web
    name: nv-audit-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: API_TOKEN
        sync: false
      - key: AHREFS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PSI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_KEY
        sync: false
      - key: CACHE_DAYS
        value: "7"
      - key: RATE_LIMIT_HOUR
        value: "30"
